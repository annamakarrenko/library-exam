{% extends 'base.html' %}

{% block content %}
<h1 class="mb-4">{% if book %}✏️ Редактирование книги{% else %}➕ Добавление книги{% endif %}</h1>

<div class="card shadow">
    <div class="card-body">
        <form method="POST" enctype="multipart/form-data">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="title" class="form-label">Название *</label>
                    <input type="text" class="form-control" id="title" name="title" value="{{ book.title if book else '' }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="author" class="form-label">Автор *</label>
                    <input type="text" class="form-control" id="author" name="author" value="{{ book.author if book else '' }}" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="year" class="form-label">Год издания *</label>
                    <input type="number" class="form-control" id="year" name="year" value="{{ book.year if book else '' }}" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="publisher" class="form-label">Издательство *</label>
                    <input type="text" class="form-control" id="publisher" name="publisher" value="{{ book.publisher if book else '' }}" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="pages" class="form-label">Количество страниц *</label>
                    <input type="number" class="form-control" id="pages" name="pages" value="{{ book.pages if book else '' }}" required>
                </div>
            </div>
            <div class="mb-3">
                <label for="genre_ids" class="form-label">Жанры *</label>
                <select class="form-select" id="genre_ids" name="genre_ids" multiple size="5" required>
                    {% for genre in genres %}
                        <option value="{{ genre.id }}" {% if book and genre in book.genres %}selected{% endif %}>{{ genre.name }}</option>
                    {% endfor %}
                </select>
                <div class="form-text">Удерживайте Ctrl (или Cmd на Mac) для выбора нескольких жанров</div>
            </div>
            <div class="mb-3">
                <label for="short_description" class="form-label">Краткое описание *</label>
                <textarea class="form-control" id="short_description" name="short_description" rows="10">{{ book.short_description if book else '' }}</textarea>
                <div class="form-text">Поддерживается разметка Markdown</div>
            </div>
            {% if not book %}
                <div class="mb-3">
                    <label for="cover" class="form-label">Обложка</label>
                    <input type="file" class="form-control" id="cover" name="cover" accept="image/*">
                </div>
            {% endif %}
            <div class="d-flex justify-content-between">
                <a href="{{ url_for('main.index') }}" class="btn btn-secondary">Отмена</a>
                <button type="submit" class="btn btn-primary">Сохранить</button>
            </div>
        </form>
    </div>
</div>

<script>
    var easymde = new EasyMDE({ element: document.getElementById('short_description') });
</script>
{% endblock %}
