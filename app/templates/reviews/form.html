{% extends 'base.html' %}

{% block content %}
<h1 class="mb-4">Написать рецензию на книгу "{{ book.title }}"</h1>

<div class="card shadow">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label for="rating" class="form-label">Оценка</label>
                <select class="form-select" id="rating" name="rating" required>
                    <option value="5">5 - отлично</option>
                    <option value="4">4 - хорошо</option>
                    <option value="3">3 - удовлетворительно</option>
                    <option value="2">2 - неудовлетворительно</option>
                    <option value="1">1 - плохо</option>
                    <option value="0">0 - ужасно</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="text" class="form-label">Текст рецензии</label>
                <textarea class="form-control" id="text" name="text" rows="10" required></textarea>
                <div class="form-text">Поддерживается разметка Markdown</div>
            </div>
            <div class="d-flex justify-content-between">
                <a href="{{ url_for('books.show', book_id=book.id) }}" class="btn btn-secondary">Отмена</a>
                <button type="submit" class="btn btn-primary">Отправить рецензию</button>
            </div>
        </form>
    </div>
</div>

<script>
    var easymde = new EasyMDE({ element: document.getElementById('text') });
</script>
{% endblock %}
